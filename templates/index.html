<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ partner_name }} Chat</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(108, 99, 255, 0.18), transparent 25%),
        radial-gradient(circle at bottom right, rgba(0, 191, 255, 0.12), transparent 25%),
        linear-gradient(135deg, #09111f, #101b34, #1b3252);
      color: white;
    }

    .main-chat {
      width: 95%;
      max-width: 1400px;
      height: 95vh;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 70px rgba(0,0,0,0.45);
    }

    .chat-header {
      padding: 24px 30px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      flex-shrink: 0;
    }
    .partner-avatar {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #8b5cf6;
}

    .chat-header {
      display: flex;
      align-items: center;
      gap: 15px;
}
    .chat-header h1 {
      font-size: 20px;
      font-weight: bold;
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    .chat-body::-webkit-scrollbar {
      width: 8px;
    }

    .chat-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-body::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
    }

    .typing {
      padding: 8px 20px;
      font-size: 13px;
      color: #bcc7ef;
      flex-shrink: 0;
    }

    .input-area {
      padding: 16px 18px 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      flex-shrink: 0;
    }

    .input-box {
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 10px;
    }

    .input-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      padding: 10px 12px;
      font-size: 15px;
    }

    .input-box input::placeholder {
      color: #b9c3eb;
    }

    .send-btn {
      border: none;
      padding: 12px 22px;
      border-radius: 14px;
      background: linear-gradient(135deg, #6c63ff, #8a7dff);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .send-btn:hover {
      transform: scale(1.03);
      opacity: 0.95;
    }

    .message-row {
      display: flex;
      width: 100%;
      margin: 8px 0;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .chat-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 10px;
     border: 2px solid #8b5cf6;
    }

    .message-row.bot {
      display: flex;
      align-items: flex-start;
    }

    .message-wrap {
      max-width: 68%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .message {
      width: fit-content;
      max-width: 100%;
      min-width: 90px;
      padding: 12px 16px;
      border-radius: 18px;
      display: inline-block;
      line-height: 1.5;
      white-space: normal;
      overflow-wrap: break-word;
      word-break: break-word;
      font-size: 14px;
    }

    .message.user {
      background: linear-gradient(135deg, #6c63ff, #7c72ff);
      color: white;
      margin-left: auto;
      text-align: left;
      border-bottom-right-radius: 6px;
    }

    .message.bot {
      background: rgba(42, 47, 74, 0.95);
      color: white;
      margin-right: auto;
      text-align: left;
      border-bottom-left-radius: 6px;
    }

    .meta {
      font-size: 12px;
      color: #aab3d9;
      padding: 0 4px;
    }

    @media (max-width: 900px) {
      body {
        padding: 10px;
      }

      .main-chat {
        width: 100%;
        height: 95vh;
        border-radius: 18px;
      }

      .chat-header {
        padding: 18px 20px;
      }

      .chat-header h1 {
        font-size: 18px;
      }

      .chat-body {
        padding: 16px 12px;
      }

      .message-wrap {
        max-width: 78%;
      }

      .message {
        font-size: 14px;
        padding: 11px 14px;
      }

      .input-area {
        padding: 12px;
      }

      .send-btn {
        padding: 11px 18px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="main-chat">
<div class="chat-header">
    <img src="{{ partner_avatar }}" class="partner-avatar">
    <div>
        <h3>Chat with {{ partner_name }}</h3>
        <p>{{ greeting }}</p>
    </div>
</div>

    <div class="chat-body" id="chatBody"></div>

    <div class="typing" id="typingText">{{ partner_name }} is ready...</div>

    <div class="input-area">
      <form class="input-box" id="chatForm">
        <input
          type="text"
          id="messageInput"
          placeholder="Type your message here..."
          autocomplete="off"
        />
        <button type="submit" class="send-btn">Send</button>
      </form>
    </div>
  </div>

  <script>
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const chatBody = document.getElementById("chatBody");
    const typingText = document.getElementById("typingText");
    const starterQuestions = [
    "Hey love, how has your day been so far? ❤️",
    "What’s been on your mind today?",
    "Tell me something good that happened today 🥰",
    "Are you feeling okay right now?",
    "What kind of mood are you in today?",
    "Did you miss me a little? 💜",
    "What are you thinking about right now?",
    "How is your heart today, love?"
  ];

  let userHasSentMessage = false;
  let starterShown = false;

  function showRandomStarterQuestion() {
    if (userHasSentMessage || starterShown) return;

    const chance = Math.random();

    // 35% chance only
    if (chance <= 0.35) {
      const randomIndex = Math.floor(Math.random() * starterQuestions.length);
      const question = starterQuestions[randomIndex];

      typingText.textContent = "{{ partner_name }} is typing...";

      setTimeout(() => {
        addMessage(question, "bot");
        typingText.textContent = "{{ partner_name }} is ready...";
        starterShown = true;
      }, 2500);
    }
  }

  window.addEventListener("load", function () {
    setTimeout(showRandomStarterQuestion, 3000);
  });

    function getTime() {
      const now = new Date();
      return now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function scrollToBottom() {
      chatBody.scrollTop = chatBody.scrollHeight;
    }
function speakText(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speech.rate = 1;
    speech.pitch = 1;
    window.speechSynthesis.speak(speech);
}

function addMessage(text, sender) {
  const row = document.createElement("div");
  row.className = `message-row ${sender}`;

  const name = sender === "user" ? "You" : "{{ partner_name }}";

  // ✅ avatar for bot
  const avatar = sender === "bot"
    ? `<img src="{{ partner_avatar }}" class="chat-avatar">`
    : "";

  row.innerHTML = `
    ${avatar}
    <div class="message-wrap">
      <div class="message ${sender}">${text}</div>
      <div class="meta">${name} • ${getTime()}</div>
    </div>
  `;

  chatBody.appendChild(row);
  scrollToBottom();
}

    chatForm.addEventListener("submit", async function (e) {
      e.preventDefault();

      const text = messageInput.value.trim();
      if (!text) return;

      addMessage(text, "user");
      messageInput.value = "";
      typingText.textContent = "{{ partner_name }} is typing...";

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });

        const data = await response.json();

        setTimeout(() => {
          addMessage(data.reply || "Sorry, I could not reply properly.", "bot");
          speakText(data.reply);
          typingText.textContent = "{{ partner_name }} is ready...";
        }, 700);
      } catch (error) {
        addMessage("Sorry, something went wrong.", "bot");
        typingText.textContent = "{{ partner_name }} is ready...";
      }
    });

    messageInput.addEventListener("keypress", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        chatForm.dispatchEvent(new Event("submit"));
      }
    });
  </script>

</body>
</html>
