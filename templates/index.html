<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ partner_name }} Chat</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #09111f, #101b34, #1b3252);
      color: white;
    }

    .main-chat {
      width: 100%;
      height: 100vh;
      display: grid;
      grid-template-columns: 380px 1fr;
    }

    .partner-panel {
      background: rgba(255,255,255,0.06);
      border-right: 1px solid rgba(255,255,255,0.1);
      padding: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .avatar-3d {
      width: 230px;
      height: 230px;
      border-radius: 50%;
      background: radial-gradient(circle, #7c3aed, #1e1b4b);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 35px rgba(139, 92, 246, 0.7);
      animation: floatAvatar 3s ease-in-out infinite;
    }

    .avatar-3d img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #8b5cf6;
    }

    .avatar-3d.speaking {
      animation: speakingPulse 0.5s infinite;
    }

    @keyframes floatAvatar {
      0%, 100% { transform: translateY(0) rotateY(0deg); }
      50% { transform: translateY(-12px) rotateY(8deg); }
    }

    @keyframes speakingPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px #8b5cf6; }
      50% { transform: scale(1.06); box-shadow: 0 0 55px #a78bfa; }
    }

    .partner-panel h2 {
      font-size: 24px;
    }

    .partner-panel p {
      color: #cbd5e1;
      text-align: center;
      line-height: 1.5;
    }

    .chat-section {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-header {
      padding: 18px 25px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .chat-header h3 {
      font-size: 20px;
    }

    .chat-header p {
      color: #b8c0df;
      margin-top: 5px;
      font-size: 14px;
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
    }

    .message-row {
      display: flex;
      margin: 12px 0;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.bot {
      justify-content: flex-start;
      align-items: flex-start;
    }

    .chat-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 10px;
      border: 2px solid #8b5cf6;
    }

    .message-wrap {
      max-width: 70%;
    }

    .message {
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 14px;
      word-break: break-word;
    }

    .message.user {
      background: linear-gradient(135deg, #6c63ff, #7c72ff);
      border-bottom-right-radius: 5px;
    }

    .message.bot {
      background: rgba(42, 47, 74, 0.95);
      border-bottom-left-radius: 5px;
    }

    .meta {
      font-size: 11px;
      color: #aab3d9;
      margin-top: 5px;
    }

    .typing {
      padding: 8px 25px;
      font-size: 13px;
      color: #bcc7ef;
    }

    .input-area {
      padding: 15px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }

    .input-box {
      display: flex;
      gap: 10px;
      background: rgba(255,255,255,0.06);
      padding: 10px;
      border-radius: 18px;
    }

    .input-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 15px;
      padding: 10px;
    }

    .send-btn, .voice-btn {
      border: none;
      padding: 12px 18px;
      border-radius: 14px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .send-btn {
      background: linear-gradient(135deg, #6c63ff, #8a7dff);
    }

    .voice-btn {
      background: linear-gradient(135deg, #10b981, #059669);
    }

    @media (max-width: 900px) {
      .main-chat {
        grid-template-columns: 1fr;
      }

      .partner-panel {
        height: 250px;
        padding: 15px;
      }

      .avatar-3d {
        width: 130px;
        height: 130px;
      }

      .avatar-3d img {
        width: 105px;
        height: 105px;
      }

      .partner-panel p {
        display: none;
      }

      .chat-section {
        height: calc(100vh - 250px);
      }
    }
  </style>
</head>

<body>

<div class="main-chat">

  <div class="partner-panel">
    <div class="avatar-3d" id="avatar3d">
      <img src="{{ partner_avatar }}" alt="{{ partner_name }}">
    </div>
    <h2>{{ partner_name }}</h2>
    <p>{{ greeting }}</p>
    <p id="voiceStatus">Voice ready 🎙️</p>
  </div>

  <div class="chat-section">
    <div class="chat-header">
      <h3>Chat with {{ partner_name }}</h3>
      <p>Speak or type your message</p>
    </div>

    <div class="chat-body" id="chatBody"></div>

    <div class="typing" id="typingText">{{ partner_name }} is ready...</div>

    <div class="input-area">
      <form class="input-box" id="chatForm">
        <button type="button" class="voice-btn" onclick="startListening()">🎤</button>
        <input type="text" id="messageInput" placeholder="Type your message here..." autocomplete="off">
        <button type="submit" class="send-btn">Send</button>
      </form>
    </div>
  </div>

</div>

<script>
  const chatForm = document.getElementById("chatForm");
  const messageInput = document.getElementById("messageInput");
  const chatBody = document.getElementById("chatBody");
  const typingText = document.getElementById("typingText");
  const avatar3d = document.getElementById("avatar3d");
  const voiceStatus = document.getElementById("voiceStatus");

  function getTime() {
    return new Date().toLocaleTimeString([], {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function scrollToBottom() {
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function addMessage(text, sender) {
    const row = document.createElement("div");
    row.className = `message-row ${sender}`;

    const name = sender === "user" ? "You" : "{{ partner_name }}";

    const avatar = sender === "bot"
      ? `<img src="{{ partner_avatar }}" class="chat-avatar">`
      : "";

    row.innerHTML = `
      ${avatar}
      <div class="message-wrap">
        <div class="message ${sender}">${text}</div>
        <div class="meta">${name} • ${getTime()}</div>
      </div>
    `;

    chatBody.appendChild(row);
    scrollToBottom();
  }

  function speakText(text) {
    if (!text) return;

    window.speechSynthesis.cancel();

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speech.rate = 1;
    speech.pitch = 1.1;

    speech.onstart = function () {
      avatar3d.classList.add("speaking");
      voiceStatus.innerText = "{{ partner_name }} is speaking...";
    };

    speech.onend = function () {
      avatar3d.classList.remove("speaking");
      voiceStatus.innerText = "Voice ready 🎙️";
    };

    window.speechSynthesis.speak(speech);
  }

  function startListening() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      alert("Your browser does not support voice input. Use Google Chrome.");
      return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;

    voiceStatus.innerText = "Listening...";
    recognition.start();

    recognition.onresult = function(event) {
      const spokenText = event.results[0][0].transcript;
      messageInput.value = spokenText;

      setTimeout(() => {
        chatForm.dispatchEvent(new Event("submit"));
      }, 300);
    };

    recognition.onerror = function() {
      voiceStatus.innerText = "Voice ready 🎙️";
    };

    recognition.onend = function() {
      voiceStatus.innerText = "Voice ready 🎙️";
    };
  }

  chatForm.addEventListener("submit", async function(e) {
    e.preventDefault();

    const text = messageInput.value.trim();
    if (!text) return;

    addMessage(text, "user");
    messageInput.value = "";
    typingText.textContent = "{{ partner_name }} is typing...";

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
      });

      const data = await response.json();
      const reply = data.reply || "Sorry, I could not reply properly.";

      addMessage(reply, "bot");
      speakText(reply);

      typingText.textContent = "{{ partner_name }} is ready...";
    } catch (error) {
      addMessage("Sorry, something went wrong.", "bot");
      typingText.textContent = "{{ partner_name }} is ready...";
    }
  });
</script>

</body>
</html>
